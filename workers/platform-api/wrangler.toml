# workers/platform-api/wrangler.toml
name = "cloudpress-platform-api"
main = "src/index.ts" # JS Glue를 엔트리포인트로 사용
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"] # Wasm 지원 활성화 (Go/Rust 로드를 위해 필수)

[[d1_databases]]
binding = "DB"
database_name = "cloudpress_platform"
database_id = "8bf6671a-88dc-4e7c-84ae-8e55331216b8"

[[kv_namespaces]]
binding = "KV"
id = "e4858ee03ee4456989ca1cfcd3746a93"

[vars]
ENVIRONMENT = "production"
# 이메일 인증 링크 생성 시 사용하는 프론트엔드 베이스 URL
PUBLIC_SITE_URL = "https://cloud-press.co.kr"

# --- 아래 값들은 시크릿이므로 wrangler.toml에 직접 넣지 않고
#     `wrangler secret put <NAME>` 명령으로 설정해야 합니다:
#   ENCRYPTION_SECRET   - Cloudflare Global API 키 등 민감정보 암호화용 (32바이트 이상 랜덤 문자열 권장)
#   RESEND_API_KEY      - Resend(https://resend.com) API 키
#   RESEND_FROM_EMAIL   - 발신 이메일 주소, 예: "CloudPress <noreply@cloud-press.co.kr>"
#                         (Resend에 도메인 인증이 완료된 주소여야 발송이 성공합니다)
