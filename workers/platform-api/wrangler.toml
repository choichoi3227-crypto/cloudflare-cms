# workers/platform-api/wrangler.toml
name = "cloudpress-platform-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
[[d1_databases]]
binding = "DB"
database_name = "cloudpress_platform"
database_id = "YOUR_PLATFORM_D1_ID"
[[kv_namespaces]]
binding = "KV"
id = "YOUR_PLATFORM_KV_ID"
[vars]
ENVIRONMENT = "production"
