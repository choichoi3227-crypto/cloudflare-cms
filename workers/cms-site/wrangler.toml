# workers/cms-site/wrangler.toml
name = "cloudpress-cms-site"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["wasm"]

[[d1_databases]]
binding = "DB"
database_name = "cp_site_template"
database_id = "YOUR_SITE_D1_ID"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_SITE_KV_ID"

[vars]
ENVIRONMENT = "production"
ADMIN_PATH = "cp-admin"
# ADMIN_SECRET은 wrangler secret put으로 설정: wrangler secret put ADMIN_SECRET
# PHP-WASM 런타임 설정 예시:
# PHP_WASM_URL = "https://example.com/php.wasm"
# PHP_WASM_ENTRYPOINT = "php_wasm_run"
# PHP_WASM_MEMORY_PAGES = "128"
